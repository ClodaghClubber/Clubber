<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GAA Fixtures Dashboard</title>
<style>
  :root{
    --bg:#0f1419; --panel:#1a212b; --border:#2a333f; --text:#e6edf3; --muted:#8b98a5;
    --accent:#2e8b57; --reject:#c0392b; --propose:#d4a017; --approve:#27ae60;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--text);}
  header{padding:20px 24px;border-bottom:1px solid var(--border);}
  header h1{margin:0 0 4px;font-size:22px;}
  header p{margin:0;color:var(--muted);font-size:13px;}
  .toolbar{display:flex;gap:12px;align-items:center;padding:16px 24px;flex-wrap:wrap;border-bottom:1px solid var(--border);}
  .toolbar label{font-size:12px;color:var(--muted);display:block;margin-bottom:4px;}
  .toolbar select, .toolbar input{background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:13px;}
  .actions{display:flex;gap:8px;margin-left:auto;}
  button{cursor:pointer;border:none;border-radius:6px;padding:8px 16px;font-size:13px;font-weight:600;color:#fff;}
  button:disabled{opacity:0.35;cursor:not-allowed;}
  .btn-approve{background:var(--approve);}
  .btn-reject{background:var(--reject);}
  .btn-remove{background:#555;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  thead th{position:sticky;top:0;background:var(--panel);text-align:left;padding:10px 12px;border-bottom:1px solid var(--border);font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;cursor:pointer;}
  tbody td{padding:9px 12px;border-bottom:1px solid var(--border);}
  tbody tr:hover{background:#1f2733;}
  tbody tr.row-rejected{opacity:0.55;}
  .status{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;text-transform:uppercase;}
  .status-proposed{background:rgba(212,160,23,.15);color:var(--propose);}
  .status-approved{background:rgba(39,174,96,.15);color:var(--approve);}
  .status-rejected{background:rgba(192,57,43,.15);color:var(--reject);}
  .empty{text-align:center;color:var(--muted);padding:40px;}
  .count{color:var(--muted);font-size:12px;padding:8px 24px;}
  .container{padding:0 0 40px;}
  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:5px;}
</style>
</head>
<body>
<header>
  <h1>GAA Fixtures Dashboard</h1>
  <p>Cork &amp; Waterford championship fixtures &middot; Laois pending (fixtures not yet published by Laois GAA)</p>
</header>

<div class="toolbar">
  <div>
    <label for="countyFilter">County</label>
    <select id="countyFilter"><option value="">All</option></select>
  </div>
  <div>
    <label for="compFilter">Competition</label>
    <select id="compFilter"><option value="">All</option></select>
  </div>
  <div>
    <label for="statusFilter">Status</label>
    <select id="statusFilter">
      <option value="">All</option>
      <option value="Proposed">Proposed</option>
      <option value="Approved">Approved</option>
      <option value="Rejected">Rejected</option>
    </select>
  </div>
  <div>
    <label for="dateFrom">From date</label>
    <input type="date" id="dateFrom">
  </div>
  <div>
    <label for="dateTo">To date</label>
    <input type="date" id="dateTo">
  </div>
  <div class="actions">
    <button class="btn-approve" id="approveBtn" disabled>Approve</button>
    <button class="btn-reject" id="rejectBtn" disabled>Reject</button>
    <button class="btn-remove" id="removeBtn" disabled>Remove</button>
  </div>
</div>

<div class="count" id="rowCount"></div>

<div class="container">
<table>
  <thead>
    <tr>
      <th><input type="checkbox" id="selectAll"></th>
      <th data-key="county">County</th>
      <th data-key="teamA">Team A</th>
      <th data-key="teamB">Team B</th>
      <th data-key="date">Date</th>
      <th data-key="day">Day</th>
      <th data-key="time">Time</th>
      <th data-key="venue">Venue</th>
      <th data-key="competition">Competition</th>
      <th data-key="round">Round</th>
      <th data-key="status">Status</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>
<div class="empty" id="emptyMsg" style="display:none;">No fixtures match the current filters.</div>
</div>

// ---- Source data (verified against official county GAA league pages) ----
function iso(d){ // d = 'D Month YYYY'
  const months={January:'01',February:'02',March:'03',April:'04',May:'05',June:'06',July:'07',August:'08',September:'09',October:'10',November:'11',December:'12'};
  const [day,month,year]=d.split(' ');
  return `${year}-${months[month]}-${day.padStart(2,'0')}`;
}
function dayName(isoDate){
  const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  return days[new Date(isoDate+'T00:00:00').getDay()];
}
function to12h(t){ // '19:15' -> '7:15 PM'
  if(!/^\d{1,2}:\d{2}$/.test(t)) return t; // e.g. 'TBC'
  let [h,m]=t.split(':').map(Number);
  const ap=h>=12?'PM':'AM';
  h=h%12; if(h===0)h=12;
  return `${h}:${String(m).padStart(2,'0')} ${ap}`;
}
function mk(county,teamA,teamB,date,time,venue,competition,round){
  const d=iso(date);
  return {county,teamA,teamB,date:d,day:dayName(d),time:to12h(time),venue,competition,round:round||'',status:'Proposed'};
}

// ---- App state ----
let fixtures = raw.map((f,i)=>({id:i+1,...f}));

const tbody=document.getElementById('tbody');
const countyFilter=document.getElementById('countyFilter');
const compFilter=document.getElementById('compFilter');
const statusFilter=document.getElementById('statusFilter');
const dateFrom=document.getElementById('dateFrom');
const dateTo=document.getElementById('dateTo');
const selectAll=document.getElementById('selectAll');
const approveBtn=document.getElementById('approveBtn');
const rejectBtn=document.getElementById('rejectBtn');
const removeBtn=document.getElementById('removeBtn');
const emptyMsg=document.getElementById('emptyMsg');
const rowCount=document.getElementById('rowCount');

let selected=new Set();
let sortKey='date', sortDir=1;

function populateFilterOptions(){
  const counties=[...new Set(fixtures.map(f=>f.county))];
  countyFilter.innerHTML='<option value="">All</option>'+counties.map(c=>`<option value="${c}">${c}</option>`).join('');
  populateCompOptions();
}

function populateCompOptions(){
  const prev=compFilter.value;
  const scoped = countyFilter.value ? fixtures.filter(f=>f.county===countyFilter.value) : fixtures;
  const comps=[...new Set(scoped.map(f=>f.competition))];
  compFilter.innerHTML='<option value="">All</option>'+comps.map(c=>`<option value="${c}">${c}</option>`).join('');
  if(comps.includes(prev)) compFilter.value=prev;
}

function getFiltered(){
  let list=fixtures.filter(f=>{
    if(countyFilter.value && f.county!==countyFilter.value) return false;
    if(compFilter.value && f.competition!==compFilter.value) return false;
    if(statusFilter.value && f.status!==statusFilter.value) return false;
    if(dateFrom.value && f.date<dateFrom.value) return false;
    if(dateTo.value && f.date>dateTo.value) return false;
    return true;
  });
  list.sort((a,b)=>{
    let av=a[sortKey], bv=b[sortKey];
    if(av<bv) return -1*sortDir;
    if(av>bv) return 1*sortDir;
    return (a.date<b.date?-1:a.date>b.date?1:0);
  });
  return list;
}

function render(){
  const list=getFiltered();
  tbody.innerHTML='';
  emptyMsg.style.display=list.length?'none':'block';
  rowCount.textContent=`${list.length} fixture${list.length!==1?'s':''} shown`;
  list.forEach(f=>{
    const tr=document.createElement('tr');
    if(f.status==='Rejected') tr.classList.add('row-rejected');
    tr.innerHTML=`
      <td><input type="checkbox" data-id="${f.id}" ${selected.has(f.id)?'checked':''}></td>
      <td>${f.county}</td>
      <td>${f.teamA}</td>
      <td>${f.teamB}</td>
      <td>${f.date}</td>
      <td>${f.day}</td>
      <td>${f.time}</td>
      <td>${f.venue}</td>
      <td>${f.competition}</td>
      <td>${f.round}</td>
      <td><span class="status status-${f.status.toLowerCase()}">${f.status}</span></td>
    `;
    tbody.appendChild(tr);
  });
  tbody.querySelectorAll('input[type=checkbox]').forEach(cb=>{
    cb.addEventListener('change',e=>{
      const id=Number(e.target.dataset.id);
      if(e.target.checked) selected.add(id); else selected.delete(id);
      updateActionButtons();
    });
  });
  updateActionButtons();
}

function updateActionButtons(){
  const selFixtures=fixtures.filter(f=>selected.has(f.id));
  approveBtn.disabled = selFixtures.length===0;
  rejectBtn.disabled = selFixtures.length===0;
  removeBtn.disabled = selFixtures.length===0 || !selFixtures.every(f=>f.status==='Rejected');
}

selectAll.addEventListener('change',()=>{
  const list=getFiltered();
  if(selectAll.checked) list.forEach(f=>selected.add(f.id));
  else list.forEach(f=>selected.delete(f.id));
  render();
});

approveBtn.addEventListener('click',()=>{
  fixtures.forEach(f=>{ if(selected.has(f.id)) f.status='Approved'; });
  render();
});
rejectBtn.addEventListener('click',()=>{
  fixtures.forEach(f=>{ if(selected.has(f.id)) f.status='Rejected'; });
  render();
});
removeBtn.addEventListener('click',()=>{
  fixtures=fixtures.filter(f=>!(selected.has(f.id) && f.status==='Rejected'));
  selected.clear();
  render();
});

countyFilter.addEventListener('change',()=>{ populateCompOptions(); render(); });
[compFilter,statusFilter,dateFrom,dateTo].forEach(el=>el.addEventListener('change',render));

document.querySelectorAll('thead th[data-key]').forEach(th=>{
  th.addEventListener('click',()=>{
    const key=th.dataset.key;
    if(sortKey===key) sortDir*=-1; else { sortKey=key; sortDir=1; }
    render();
  });
});

populateFilterOptions();
render();
</script>
